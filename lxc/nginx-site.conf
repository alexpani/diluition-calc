# Configurazione Nginx per Calcolo Diluizioni
# I placeholder __PHP_SOCK__ e __WEB_ROOT__ vengono sostituiti da provision.sh.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root __WEB_ROOT__;
    index diluizioni.html index.html;

    charset utf-8;

    # Log
    access_log /var/log/nginx/calcolo-diluizioni.access.log;
    error_log  /var/log/nginx/calcolo-diluizioni.error.log;

    # Homepage -> diluizioni.html
    location = / {
        try_files /diluizioni.html =404;
    }

    # Serve file statici, altrimenti 404
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP tramite php-fpm (solo file realmente esistenti, niente path-info)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:__PHP_SOCK__;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
    }

    # Nega l'accesso a file sensibili
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(config\.php|setup\.php|\.env.*)$ {
        deny all;
        return 404;
    }

    # Cache blanda per asset statici
    location ~* \.(?:css|js|ico|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # Upload/request body piccoli: e' un'app di calcolo, non serve di piu'
    client_max_body_size 1m;
}
